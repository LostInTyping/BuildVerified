name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Focus on:
            - Type safety and TypeScript strictness (no `any`)
            - Next.js best practices (server components by default, static generation)
            - Tailwind CSS consistency with existing theme tokens
            - Accessibility concerns
            - Code quality and maintainability
            - Whether changes match existing patterns in the codebase

            Be direct and concise. Flag real issues, skip nitpicks.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 5
